{% extends 'chat/base.html' %}
{% block title %}Login — ChatApp{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 0 auto;">
    <div class="card">
        <h2 style="margin-bottom: 6px; color: #075e54;">Welcome back 👋</h2>
        <p style="color: #888; margin-bottom: 24px; font-size: 0.9rem;">Sign in to continue chatting</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            {% if form.errors %}
                <div class="alert alert-error">Invalid username or password.</div>
            {% endif %}
            <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
        </form>

        <p style="text-align:center; margin-top: 16px; font-size: 0.9rem; color: #888;">
            Don't have an account? <a href="{% url 'register' %}" style="color: #075e54; font-weight:600;">Register</a>
        </p>
    </div>
</div>
{% endblock %}
